    @font-face {

}

    body {

    /* ── SPLIT NAV ── */
    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 4rem;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      position: relative;
    }
    .nav-group {
      display: flex;
      gap: 2.25rem;
      align-items: center;
    }
    .nav-link {
      text-decoration: none;
      color: #1c1c1e;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .nav-link:hover { opacity: 0.5; }
    .nav-brand {
      font-family: 'Juniper Bay', cursive;
      font-size: 1.45rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1c1c1e;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
    }
    .nav-toggle span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #1c1c1e;
      transition: transform 0.25s, opacity 0.25s;
    }
    @media (max-width: 900px) { .site-nav { padding: 1.1rem 2rem; } }
    @media (max-width: 768px) {
      .nav-group { display: none; }
      .nav-toggle { display: flex; }
      .site-nav.open .nav-group {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        background: #fff;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid rgba(0,0,0,0.07);
        z-index: 100;
      }
      .site-nav.open .nav-group:first-child { border-top: 1px solid rgba(0,0,0,0.07); }
    }

    .about-image-section {
      padding: 4rem 0;
    }

    .about-image-section img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
    }

    .instagram-footer {
      position: relative;
      height: 300px;
      background-color: #1a1a1a;
      overflow: hidden;
    }

    .instagram-footer .overlay-link {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      color: white;
      text-decoration: none;
      position: relative;
      z-index: 2;
      transition: background-color 0.3s ease;
      font-family: 'Juniper Bay', cursive;
    }

    .instagram-footer .overlay-link:hover {
      background-color: rgba(0, 0, 0, 0.4);
    }

    .instagram-footer .overlay-content {
      text-align: center;
    }

    .instagram-footer i.bi-instagram {
      font-size: 1.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .instagram-footer h2 {
      font-weight: bold;
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }

    .instagram-footer p {
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 2px;

    }

    footer .small {

    /* --------- MOBILE & A11Y ENHANCEMENTS (ADDED) --------- */

    /* Tappable nav targets + subtle divider */
    .navbar { border-bottom: 1px solid rgba(0,0,0,0.06); }
    .navbar-toggler { border: 1px solid rgba(0,0,0,0.2) !important; }
    .navbar-nav .nav-link { padding: .75rem .75rem; }

    /* Constrain content width nicely on larger tablets/desktops */
    .about-container { max-width: 960px; margin-inline: auto; }

    /* Phone-friendly spacing/typography */
    @media (max-width: 576px) {
      .about-image-section { padding: 2.25rem 0; }

      .instagram-footer h2 { font-size: 1.25rem; }
      .instagram-footer i.bi-instagram { font-size: 1.25rem; }
      .instagram-footer p { font-size: 0.7rem; letter-spacing: 1.5px; }
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

    /* LONG‑PRESS / SAVE PROTECTION (ADDED, NON‑DESTRUCTIVE) */
    .no-save {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
      -user-drag: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Helper for screen readers */
    .sr-only {
      position: absolute !important;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,1px,1px);
      white-space: nowrap; border: 0;

<!-- Bootstrap JS -->
<!-- Mobile nav toggle -->
<script>
  (function () {
    'use strict';
    var nav = document.getElementById('siteNav');
    var btn = document.getElementById('navToggle');
    if (btn && nav) {
      btn.addEventListener('click', function () {
        var open = nav.classList.toggle('open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  })();
</script>

<!-- Protection Script -->
<script>
  /* BEST PRACTICES: isolate in IIFE + strict mode; keep your original behavior intact */
  (function(){
    'use strict';
    document.addEventListener('DOMContentLoaded', function () {
      // Disable cut, copy, paste
      document.body.addEventListener('cut', e => e.preventDefault(), { passive: false });
      document.body.addEventListener('copy', e => e.preventDefault(), { passive: false });
      document.body.addEventListener('paste', e => e.preventDefault(), { passive: false });

      // Disable right-click and drag on images
      const images = document.querySelectorAll('img');
      images.forEach(img => {
        img.addEventListener('contextmenu', e => e.preventDefault(), { passive: false });
        img.addEventListener('dragstart', e => e.preventDefault(), { passive: false });
        img.setAttribute('draggable', 'false');
        // ensure mobile protection class even if not in markup
        img.classList.add('no-save');
      });

      // a11y: visible focus ring without global CSS changes
      document.querySelectorAll('a, button').forEach(el => {
        el.addEventListener('focus', () => el.style.outline = '2px solid rgba(0,0,0,0.35)', { passive: true });
        el.addEventListener('blur',  () => el.style.outline = 'none', { passive: true });
      });

      /* EXTRA: iOS/Android long-press guard (non-destructive) */
      let pressTimer;
      images.forEach(img => {
        const cancelTimer = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };

        img.addEventListener('touchstart', (e) => {
          // allow normal taps/scroll; only block if it becomes a long press
          pressTimer = setTimeout(() => { try { e.preventDefault(); } catch {} }, 450);
        }, { passive: false });

        img.addEventListener('touchend', cancelTimer, { passive: true });
        img.addEventListener('touchmove', cancelTimer, { passive: true });
        img.addEventListener('pointerup', cancelTimer, { passive: true });

        // iOS gesture safeguard
        img.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
      });

      // Reduced data mode: slightly lighten lazy decode if present later
      if (window.matchMedia && window.matchMedia('(prefers-reduced-data: reduce)').matches) {
        document.querySelectorAll('img[loading="lazy"]').forEach(img => img.removeAttribute('decoding'));
      }
    });
  })();
</script>
